attendre",description:"Les deux armées se font face de part et d'autre d'un ruisseau. Bélisaire engage sa cavalerie immédiatement, sans attendre son infanterie encore en marche.",positions:{cav:m(30,30),inf:Ce(4,30),van:m(66,30,180),tza:m(72,24),gel:m(78,36)}},{titre:"Trois charges au centre",description:"La cavalerie byzantine franchit trois fois le ruisseau pour frapper le centre vandale, où combat Tzazon. À la troisième charge, Tzazon tombe ; l'infanterie byzantine arrive en ligne.",positions:{cav:m(58,30,0),tza:U(70,22,90),inf:m(30,30)}},{titre:"L'effondrement du royaume",description:"La ligne vandale se replie sur le camp, puis Gélimer s'enfuit à la nuit : l'armée se dissout. Le royaume vandale d'Afrique disparaît en une campagne.",positions:{van:U(84,34,200),gel:U(94,44,30),cav:m(76,28,10),inf:m(60,32,0)}}]},"taginae-552":{terrain:[{type:"colline",x:14,y:14,rx:12,ry:6},{type:"label",x:80,y:56,text:"Apennins (Busta Gallorum)"}],units:[b("arcG","byz","archers","Archers (aile g.)"),b("arcD","byz","archers","Archers (aile d.)"),b("inf","byz","infanterie","Cavaliers démontés"),b("res","byz","cavalerie","Réserve (Narsès)"),b("gothC","ennemi","cavalerie","Cavalerie de Totila"),b("gothI","ennemi","infanterie","Infanterie gothique")],phases:[{titre:"Le croissant de Narsès",description:"Narsès démonte sa cavalerie au centre et déploie des milliers d'archers en croissant sur les ailes. Totila, qui attend des renforts, gagne du temps — puis choisit la charge frontale.",positions:{arcG:m(24,8,40),arcD:m(24,52,-40),inf:m(18,30),res:m(8,30),gothC:m(70,30,180),gothI:m(84,30,180)}},{titre:"La charge sous les flèches",description:"La cavalerie gothique, lancée sans soutien d'infanterie, s'enfonce dans le croissant : les volées convergentes des deux ailes la déciment avant même le contact.",positions:{gothC:m(38,30,180)}},{titre:"La contre-attaque décisive",description:"En fin de journée, Narsès engage sa réserve : la cavalerie gothique épuisée reflue sur sa propre infanterie et tout se débande. Totila, blessé dans la fuite, meurt — la guerre gothique est décidée.",positions:{res:m(30,30,0),gothC:U(66,34,200),gothI:U(88,32,190),inf:m(34,28,0)}}]},"casilinum-554":{terrain:[{type:"riviere",points:"8,58 20,44 30,26 36,6",label:"Volturno"},{type:"label",x:78,y:58,text:"vers Capoue"}],units:[b("centre","byz","infanterie","Centre (Hérules)"),b("cavG","byz","cavalerie","Cav. + archers (g.)"),b("cavD","byz","cavalerie","Cav. + archers (d.)"),b("coin","ennemi","infanterie","Coin franc (Butilin)")],phases:[{titre:"Le coin franc",description:"L'infanterie franco-alamane attaque en formation de coin. Narsès place son infanterie au centre et sa cavalerie d'archers sur les ailes, légèrement en retrait.",positions:{centre:m(34,30),cavG:m(40,8),cavD:m(40,52),coin:m(70,30,180)}},{titre:"Le centre plie, les ailes se referment",description:"Le coin enfonce le centre byzantin — qui recule en ordre, comme prévu. Les ailes pivotent et criblent de flèches la masse franque, incapable de riposter à distance.",positions:{centre:m(24,30),coin:m(48,30,180),cavG:m(56,14,140),cavD:m(56,46,-140)}},{titre:"L'anéantissement",description:"Encerclé, le coin franc est détruit ; Butilin tombe avec son armée. La dernière grande invasion de l'Italie justinienne s'achève sur le Volturno.",positions:{coin:U(50,30,90),centre:m(34,30,0),cavG:m(52,22,120),cavD:m(52,40,-120)}}]},"solachon-586":{terrain:[{type:"riviere",points:"4,54 30,56 60,54 96,58",label:"accès à l'eau (coupé)"},{type:"colline",x:88,y:14,rx:10,ry:5},{type:"label",x:16,y:6,text:"vers Mardin"}],units:[b("bG","byz","cavalerie","Aile gauche"),b("bC","byz","infanterie","Centre (Philippikos)"),b("bD","byz","cavalerie","Aile droite"),b("pers","ennemi","cavalerie","Armée perse"),b("kard","ennemi","chef","Le Kardarigan")],phases:[{titre:"L'interception dans la plaine",description:"Philippikos intercepte l'armée perse en marche vers Mardin, par une chaleur accablante, en la maintenant loin de l'eau. Les deux armées se déploient en trois corps.",positions:{bG:m(22,12),bC:m(18,30),bD:m(22,48),pers:m(66,30,180),kard:m(76,30)}},{titre:"L'aile droite enfonce la ligne",description:"L'aile droite byzantine met en pièces la gauche perse ; le centre tient le choc pendant que la ligne sassanide, assoiffée, perd sa cohésion.",positions:{bD:m(50,40,-20),pers:m(58,28,190),bC:m(30,30)}},{titre:"La débandade",description:"L'armée perse s'effondre ; les rescapés se réfugient sur une colline sans eau avant de se disperser. Le Kardarigan s'échappe de justesse — plus grande victoire rangée de la guerre de 572-591.",positions:{pers:U(86,16,160),kard:U(92,10,150),bD:m(62,34,-10),bC:m(44,30),bG:m(48,16,-20)}}]},"constantinople-626":{terrain:[{type:"murs",points:"30,6 28,26 30,46",label:"murs théodosiens"},{type:"mer",points:"0,48 100,48 100,62 0,62",label:"Corne d'Or / Bosphore"},{type:"label",x:88,y:44,text:"Chalcédoine"}],units:[b("gar","byz","infanterie","Garnison (Bonos)"),b("flot","byz","flotte","Marine byzantine"),b("avar","ennemi","infanterie","Avars et Slaves"),b("mach","ennemi","machine","Machines de siège"),b("mono","ennemi","flotte","Monoxyles slaves"),b("pers","ennemi","infanterie","Perses (Shahrbaraz)")],phases:[{titre:"La ville prise en tenaille",description:"Le khagan avar assiège les murs avec ses machines pendant que les Perses campent sur la rive asiatique. Tout dépend de la jonction des deux armées — donc de la mer.",positions:{gar:m(22,26,0),flot:m(40,54,0),avar:m(48,20,180),mach:m(40,30),mono:Ce(70,54),pers:m(90,36,180)}},{titre:"Les assauts échouent, la mer est verrouillée",description:"Les assauts contre les murs théodosiens sont repoussés. La flotte byzantine patrouille les détroits : les Perses ne peuvent pas traverser.",positions:{avar:m(38,20,180),mono:m(66,54,180)}},{titre:"Le massacre de la Corne d'Or",description:"La flottille slave qui devait porter l'assaut décisif est détruite dans la Corne d'Or. Le khagan brûle ses machines et se retire ; la tradition attribue le salut de la ville à la Vierge.",positions:{mono:U(58,56,160),flot:m(52,52,0),avar:U(64,12,20),mach:Ce(40,30),pers:U(96,36,0)}}]},"ninive-627":{terrain:[{type:"riviere",points:"6,10 20,8 40,10 70,6 96,10",label:"Tigre"},{type:"colline",x:80,y:50,rx:14,ry:6},{type:"label",x:20,y:56,text:"plaine de Ninive"}],units:[b("byz","byz","cavalerie","Armée d'Héraclius"),b("her","byz","chef","Héraclius"),b("per","ennemi","infanterie","Armée perse"),b("rha","ennemi","chef","Rhahzadh")],phases:[{titre:"Bataille acceptée dans le brouillard",description:"Après des années de campagnes par le Caucase, Héraclius offre la bataille dans la plaine de Ninive, un matin de brouillard qui masque les mouvements — avant l'arrivée des renforts perses.",positions:{byz:m(26,30),her:m(18,30),per:m(68,30,180),rha:m(78,30)}},{titre:"La mêlée et le duel",description:"Huit heures de combat indécis. Selon la tradition — peut-être embellie — Héraclius abat Rhahzadh en combat singulier au cœur de la mêlée.",positions:{byz:m(44,30),her:m(50,26),per:m(56,30,180),rha:U(56,36,90)}},{titre:"La Perse à genoux",description:"Privée de son chef, l'armée perse se disloque à la nuit. Quelques semaines plus tard, Khosrô II est renversé : la Perse rend toutes ses conquêtes et la Vraie Croix.",positions:{per:U(84,34,170),byz:m(60,30),her:m(54,30)}}]},"constantinople-674":{terrain:[{type:"murs",points:"24,4 22,24 24,44",label:"Constantinople"},{type:"mer",points:"0,44 100,44 100,62 0,62",label:"mer de Marmara"}],units:[b("byzf","byz","flotte","Flotte impériale (siphons)"),b("feu","byz","feu","Feu grégeois"),b("arf1","ennemi","flotte","Escadre omeyyade"),b("arf2","ennemi","flotte","Escadre omeyyade")],phases:[{titre:"Le blocus saisonnier",description:"Selon le récit traditionnel, la flotte de Muʿawiya s'installe dans la Marmara et attaque la ville à chaque belle saison. (La chronologie exacte est aujourd'hui débattue.)",positions:{byzf:m(30,50),feu:Ce(30,50),arf1:m(60,50,180),arf2:m(76,56,180)}},{titre:"L'arme de Kallinikos",description:"Les navires byzantins équipés des nouveaux siphons projettent le feu grégeois — un incendiaire qui brûle sur l'eau. Les escadres arabes subissent des pertes croissantes.",positions:{byzf:m(44,50),feu:m(54,50),arf1:U(64,50,160)}},{titre:"Retraite et paix de trente ans",description:"La flotte omeyyade se retire, achevée par une tempête au large de Syllaion ; l'armée de terre est battue en Asie Mineure. Muʿawiya conclut une paix de trente ans : premier grand coup d'arrêt de l'expansion arabe.",positions:{arf1:Ce(90,56),arf2:U(90,56,150),feu:Ce(54,50),byzf:m(38,50)}}]},"constantinople-717":{terrain:[{type:"murs",points:"26,4 24,24 26,44",label:"murs théodosiens"},{type:"mer",points:"0,44 100,44 100,62 0,62",label:"Marmara / Bosphore"},{type:"label",x:84,y:6,text:"Thrace"}],units:[b("gar","byz","infanterie","Garnison (Léon III)"),b("byzf","byz","flotte","Flotte (feu grégeois)"),b("feu","byz","feu","Feu grégeois"),b("bulg","allie","cavalerie","Bulgares de Tervel"),b("arm","ennemi","infanterie","Armée de Maslama"),b("arf","ennemi","flotte","Flotte omeyyade")],phases:[{titre:"L'investissement total",description:"Août 717 : Maslama investit la ville par terre avec des lignes retranchées, pendant qu'une flotte énorme tente de fermer les détroits.",positions:{gar:m(18,24,0),byzf:m(34,50),feu:Ce(34,50),bulg:Ce(80,10),arm:m(44,22,180),arf:m(64,52,180)}},{titre:"Le feu grégeois frappe",description:"Dès l'automne, les chélandions à siphons incendient une partie de la flotte arabe ; le ravitaillement maritime des assiégeants devient précaire.",positions:{feu:m(52,52),arf:U(72,54,160),byzf:m(46,50)}},{titre:"L'hiver, la famine, les Bulgares",description:"Un hiver exceptionnellement rigoureux décime le camp arabe ; les cavaliers bulgares de Tervel attaquent les fourrageurs et infligent de lourdes pertes.",positions:{bulg:m(64,12,200),arm:m(46,26,180)}},{titre:"La levée du siège",description:"15 août 718 : un an jour pour jour après son début, le siège est levé. L'armée et la flotte omeyyades, décimées, refluent — la poussée arabe vers l'Europe du Sud-Est est brisée.",positions:{arm:U(84,20,0),arf:Ce(92,56),feu:Ce(52,52),gar:m(20,24),bulg:m(72,10,180)}}]},"akroinon-740":{terrain:[{type:"colline",x:16,y:12,rx:12,ry:6},{type:"label",x:78,y:8,text:"← autres colonnes de raid"},{type:"label",x:50,y:58,text:"Phrygie"}],units:[b("byz","byz","infanterie","Léon III et Constantin"),b("cav","byz","cavalerie","Cavalerie thématique"),b("arab","ennemi","cavalerie","Colonne d'al-Battal")],phases:[{titre:"Le grand raid de 740",description:"Les colonnes omeyyades se dispersent pour piller l'Anatolie. Léon III et son fils suivent celle d'al-Battal, forte d'environ 20 000 hommes selon des sources tardives.",positions:{byz:m(24,28),cav:m(28,44),arab:m(66,30,180)}},{titre:"L'interception à Akroinon",description:"Les Byzantins acceptent la bataille rangée — fait rare depuis un siècle face aux armées du califat. Le déroulement précis est mal connu, mais le choc tourne à leur avantage.",positions:{byz:m(44,26,0),cav:m(48,42,-20),arab:m(56,30,180)}},{titre:"La colonne détruite",description:"Al-Battal et al-Malik tombent avec le gros de la colonne. Combinée aux crises internes du califat, la défaite met fin aux grandes invasions annuelles de l'Anatolie.",positions:{arab:U(80,34,160),byz:m(54,28),cav:m(62,40,-10)}}]},"lalakaon-863":{terrain:[{type:"riviere",points:"40,4 44,20 42,38 46,58",label:"Lalakaon"},{type:"colline",x:60,y:30,rx:8,ry:4,label:"Poson"},{type:"label",x:14,y:6,text:"mer Noire au nord"}],units:[b("nord","byz","infanterie","Corps du nord"),b("sud","byz","infanterie","Corps du sud"),b("ouest","byz","cavalerie","Petronas (ouest)"),b("omar","ennemi","cavalerie","Armée d'Omar")],phases:[{titre:"La convergence",description:"Après son raid jusqu'à la mer Noire, Omar de Mélitène reprend le chemin du sud. Petronas fait converger trois groupes d'armées — nord, ouest, sud — vers son itinéraire.",positions:{nord:m(56,8,90),sud:m(58,54,-90),ouest:m(18,30),omar:m(58,30,200)}},{titre:"L'encerclement à Poson",description:"Près de la colline de Poson, toutes les routes sont bloquées. Omar tente de forcer le passage vers l'ouest, contre le corps de Petronas.",positions:{nord:m(58,16,90),sud:m(60,46,-90),ouest:m(34,30),omar:m(50,30,180)}},{titre:"L'anéantissement",description:"La percée échoue ; encerclée, l'armée de Mélitène est détruite et Omar tombe. L'initiative passe définitivement à Byzance sur la frontière orientale.",positions:{omar:U(50,30,90),nord:m(54,22,90),sud:m(56,40,-90),ouest:m(42,30)}}]},"bathys-ryax-872":{terrain:[{type:"colline",x:30,y:12,rx:16,ry:6},{type:"colline",x:66,y:12,rx:14,ry:6},{type:"camp",x:48,y:34,label:"camp paulicien"},{type:"label",x:48,y:58,text:"défilé de Bathys Ryax"}],units:[b("emb1","byz","infanterie","Embuscade (g.)"),b("emb2","byz","infanterie","Embuscade (d.)"),b("gros","byz","cavalerie","Christophe (à distance)"),b("paul","ennemi","cavalerie","Pauliciens"),b("chry","ennemi","chef","Chrysocheir")],phases:[{titre:"La filature",description:"L'armée paulicienne, revenant de raid, campe dans le défilé. Deux détachements byzantins s'embusquent de nuit sur les crêtes ; le gros de l'armée suit à distance.",positions:{emb1:m(28,14),emb2:m(64,14),gros:m(10,44),paul:m(48,40),chry:m(56,38)}},{titre:"L'attaque à l'aube",description:"À l'aube, les deux détachements dévalent sur le camp endormi en sonnant la charge : les Pauliciens croient l'armée impériale entière sur eux.",positions:{emb1:m(40,26,45),emb2:m(56,26,135)}},{titre:"La panique et la fin de Téphrikè",description:"La panique emporte tout ; Chrysocheir est tué dans la poursuite. L'État paulicien de Téphrikè s'effondre peu après — l'Anatolie orientale est consolidée.",positions:{paul:U(80,46,20),chry:U(88,50,30),emb1:m(48,34,20),emb2:m(60,32,150),gros:m(30,44,0)}}]},"cap-stelai-880":{terrain:[{type:"mer",points:"0,0 100,0 100,62 0,62",label:"mer Ionienne"},{type:"murs",points:"0,50 8,44 14,52 6,58 0,50",label:"Calabre"}],units:[b("byzf","byz","flotte","Flotte de Nasar"),b("agf","ennemi","flotte","Flotte aghlabide"),b("feu","byz","feu","Attaque de nuit")],phases:[{titre:"L'approche nocturne",description:"Envoyé rétablir la situation en Occident, le drongaire Nasar localise la flotte aghlabide au mouillage près du cap Stelai et l'approche de nuit.",positions:{byzf:m(28,30),agf:m(66,34,180),feu:Ce(50,32)}},{titre:"La surprise",description:"L'attaque surprend les équipages : une grande partie des navires est incendiée ou capturée avant d'avoir pu manœuvrer.",positions:{byzf:m(50,30),feu:m(60,34),agf:U(70,36,150)}},{titre:"La mer redevient byzantine",description:"Le butin est énorme — les chroniqueurs disent que le prix des captifs s'effondra sur les marchés. La maîtrise de la Tyrrhénienne couvre la reconquête de l'Italie du Sud.",positions:{agf:Ce(84,40),feu:Ce(60,34),byzf:m(58,32)}}]},"melitene-934":{terrain:[{type:"murs",points:"40,20 60,20 62,40 38,40 40,20",label:"Mélitène"},{type:"riviere",points:"80,4 84,24 82,44 86,58",label:"Euphrate"},{type:"label",x:18,y:54,text:"campagnes dévastées"}],units:[b("kour","byz","infanterie","Jean Kourkouas"),b("arm","allie","cavalerie","Arméniens (Mélias)"),b("gar","ennemi","infanterie","Défenseurs")],phases:[{titre:"L'étau se referme",description:"Depuis des années, Kourkouas réduit les forteresses voisines et dévaste les campagnes : Mélitène, plusieurs fois soumise puis rebelle, se retrouve isolée.",positions:{kour:m(16,30,0),arm:m(30,48,-45),gar:m(50,30)}},{titre:"Le blocus final",description:"Le blocus affame la ville, sans espoir de secours : les émirats voisins, affaiblis, ne bougent pas.",positions:{kour:m(28,28,0),arm:m(40,48,-60)}},{titre:"19 mai 934 : l'annexion",description:"Mélitène capitule et devient domaine impérial — première grande cité de la frontière arabe annexée durablement. L'époque des reconquêtes commence.",positions:{gar:Ce(50,30),kour:m(50,30,0),arm:m(56,44,-60)}}]},"bosphore-941":{terrain:[{type:"mer",points:"0,10 100,10 100,62 0,62",label:"entrée du Bosphore"},{type:"murs",points:"0,10 100,10",label:"côte de Bithynie au sud"}],units:[b("chel","byz","flotte","15 chélandions (Théophane)"),b("feu","byz","feu","Feu grégeois"),b("rus","ennemi","flotte","Monoxyles rous'"),b("rus2","ennemi","flotte","Monoxyles rous'")],phases:[{titre:"Une défense improvisée",description:"11 juin 941 : la grande flottille d'Igor approche pendant que la flotte principale est absente. Théophane arme en hâte quinze vieux chélandions équipés de siphons.",positions:{chel:m(24,34),feu:Ce(24,34),rus:m(66,26,180),rus2:m(74,44,180)}},{titre:"Mer calme : l'arme parfaite",description:"Par mer d'huile — condition idéale pour l'incendiaire —, les chélandions projettent le feu grégeois « comme la foudre » : les monoxyles flambent, les équipages se jettent à l'eau.",positions:{chel:m(42,34),feu:m(54,32),rus:U(62,24,150)}},{titre:"La destruction du raid",description:"Les survivants qui pillent la Bithynie sont écrasés à terre, puis le reste de la flottille est détruit au retour. Le traité byzantino-rous' de 944 suivra.",positions:{rus:Ce(84,20),rus2:U(88,48,160),feu:Ce(54,32),chel:m(52,36)}}]}},Kg={"andrassos-960":{terrain:[{type:"colline",x:30,y:12,rx:20,ry:6},{type:"colline",x:70,y:12,rx:18,ry:6},{type:"colline",x:30,y:50,rx:20,ry:6},{type:"colline",x:70,y:50,rx:18,ry:6},{type:"label",x:50,y:58,text:"défilé du Taurus (site débattu)"},{type:"label",x:88,y:30,text:"vers la Syrie →"}],units:[b("emb1","byz","infanterie","Léon Phokas (crêtes)"),b("emb2","byz","archers","Archers (crêtes)"),b("ham","ennemi","cavalerie","Colonne de Sayf al-Dawla"),b("but","ennemi","infanterie","Butin et captifs")],phases:[{titre:"Laisser passer, puis fermer",description:"Trop faible pour une bataille rangée, Léon Phokas occupe en silence les pentes du défilé que doit emprunter l'armée hamdanide chargée de butin — la tactique du traité « De l'escarmouche ».",positions:{emb1:m(30,16),emb2:m(70,16),ham:m(20,32,0),but:m(8,34,0)}},{titre:"Le piège se referme",description:"Quand la colonne s'étire au plus profond du passage, les Byzantins dévalent des deux côtés : ni la cavalerie ni le commandement ne peuvent se déployer.",positions:{ham:m(50,32,0),but:m(34,34,0),emb1:m(36,24,60),emb2:m(66,24,120)}},{titre:"La fin de la menace hamdanide",description:"L'armée de raid est anéantie, les captifs libérés ; Sayf al-Dawla s'échappe avec une poignée de cavaliers. La voie des reconquêtes de Cilicie et d'Antioche est ouverte.",positions:{ham:U(64,34,30),but:m(24,40,180),emb1:m(44,30,40),emb2:m(60,30,140)}}]},"crete-961":{terrain:[{type:"mer",points:"0,0 100,0 100,20 0,20",label:"mer de Crète"},{type:"murs",points:"38,30 62,30 60,46 40,46 38,30",label:"Chandax"},{type:"label",x:14,y:56,text:"Crète"}],units:[b("flot","byz","flotte","Armada impériale"),b("armee","byz","infanterie","Nicéphore Phokas"),b("circ","byz","machine","Circonvallation"),b("gar","ennemi","infanterie","Défenseurs de l'émirat")],phases:[{titre:"Le débarquement (juillet 960)",description:"Une armada exceptionnelle débarque l'armée avec des rampes permettant aux cavaliers de charger directement depuis les navires. Les troupes de l'émirat sont battues et se réfugient dans Chandax.",positions:{flot:m(30,12),armee:m(28,26,0),circ:Ce(50,24),gar:m(50,38)}},{titre:"Un hiver de siège",description:"Nicéphore enferme la ville derrière une ligne de circonvallation et maintient le siège tout l'hiver — prouesse logistique — en repoussant sorties et secours venus de l'intérieur de l'île.",positions:{armee:m(38,26,0),circ:m(50,24),flot:m(50,10)}},{titre:"L'assaut final (7 mars 961)",description:"Les machines ouvrent la brèche et la ville tombe. Après 135 ans, l'émirat corsaire disparaît : l'Égée respire, et le prestige de cette victoire portera Nicéphore vers le trône.",positions:{armee:m(50,34,0),gar:U(56,42,90),circ:m(46,28)}}]},"arcadiopolis-970":{terrain:[{type:"murs",points:"6,22 14,18 18,28 10,32 6,22",label:"Arcadiopolis"},{type:"colline",x:52,y:10,rx:14,ry:5,label:"bois (embuscade)"},{type:"colline",x:56,y:52,rx:14,ry:5,label:"bois (embuscade)"}],units:[b("app","byz","cavalerie","Corps d'appât"),b("emb1","byz","cavalerie","Embuscade nord"),b("emb2","byz","cavalerie","Embuscade sud"),b("pech","ennemi","cavalerie","Petchénègues"),b("coal","ennemi","infanterie","Coalition (Rous', Bulgares)")],phases:[{titre:"La feinte de Bardas Sklèros",description:"Face à une coalition supérieure en nombre, Sklèros envoie un petit corps harceler le contingent petchénègue, puis feindre la fuite vers Arcadiopolis.",positions:{app:m(38,30,180),emb1:m(50,12),emb2:m(54,50),pech:m(62,30,180),coal:m(86,30,180)}},{titre:"La poursuite dans le piège",description:"Les Petchénègues se lancent à la poursuite, se coupant du gros de la coalition — et passent entre les deux détachements dissimulés.",positions:{app:m(24,28,180),pech:m(42,30,180)}},{titre:"La nasse",description:"L'appât fait volte-face, les embuscades chargent les flancs : le contingent est détruit. Démoralisée, la coalition reflue — Tzimiskès aura le temps de préparer la campagne de 971.",positions:{app:m(30,30,0),emb1:m(44,20,60),emb2:m(48,42,-60),pech:U(44,30,90),coal:U(90,30,0)}}]},"dorostolon-971":{terrain:[{type:"riviere",points:"0,12 30,10 60,12 100,10",label:"Danube"},{type:"murs",points:"38,22 62,22 60,38 40,38 38,22",label:"Dorostolon"}],units:[b("armee","byz","infanterie","Jean Tzimiskès"),b("tagma","byz","cavalerie","Tagmata"),b("flot","byz","flotte","Flotte (feu grégeois)"),b("rus","ennemi","infanterie","Rous' de Sviatoslav")],phases:[{titre:"L'investissement",description:"Après la prise de Preslav, Tzimiskès enferme Sviatoslav dans Dorostolon. La flotte impériale remonte le Danube : le blocus est complet, par terre et par fleuve.",positions:{armee:m(30,46,0),tagma:m(64,46,0),flot:m(50,8),rus:m(50,30)}},{titre:"Les sorties désespérées",description:"Pendant 65 jours, les Rous' multiplient les sorties en rangs serrés, murs de boucliers contre cataphractes ; leur champion Ikmor est abattu en pleine bataille.",positions:{rus:m(50,44,-90),armee:m(34,48,0),tagma:m(60,48,180)}},{titre:"Le traité du Danube",description:"Affamé, Sviatoslav capitule : les survivants évacuent les Balkans par le fleuve. La Bulgarie orientale est annexée — le Danube redevient frontière impériale.",positions:{rus:U(80,14,0),armee:m(50,30,0),tagma:m(64,40,0),flot:m(64,8)}}]},"spercheios-997":{terrain:[{type:"riviere",points:"0,30 24,32 50,30 76,32 100,30",label:"Sperchée en crue"},{type:"camp",x:66,y:14,label:"camp bulgare"},{type:"label",x:16,y:56,text:"vers Lamía"}],units:[b("byz","byz","cavalerie","Nicéphore Ouranos"),b("bulg","ennemi","infanterie","Armée de Samuel"),b("sam","ennemi","chef","Samuel et Radomir")],phases:[{titre:"Le fleuve infranchissable",description:"Samuel, revenant d'un raid jusqu'au Péloponnèse, campe au nord du Sperchée en crue, persuadé que rien ne peut traverser. L'armée byzantine arrive sur la rive opposée.",positions:{byz:m(30,46,0),bulg:m(64,18),sam:m(74,12)}},{titre:"Le gué dans la nuit",description:"Les éclaireurs d'Ouranos découvrent un passage guéable en amont : l'armée traverse de nuit, en silence.",positions:{byz:m(20,32,45)}},{titre:"Le camp submergé",description:"L'attaque à l'aube surprend le camp endormi : l'armée bulgare est anéantie sans bataille rangée. Samuel et son fils, blessés, s'échappent en se cachant parmi les morts.",positions:{byz:m(52,18,10),bulg:U(70,16,100),sam:U(88,10,20)}}]},"kleidion-1014":{terrain:[{type:"colline",x:30,y:8,rx:26,ry:6,label:"Belasitsa"},{type:"colline",x:34,y:52,rx:26,ry:6},{type:"murs",points:"44,18 46,30 44,44",label:"palissade"},{type:"label",x:84,y:56,text:"vers la Bulgarie"}],units:[b("bas","byz","infanterie","Basile II (front)"),b("xiph","byz","cavalerie","Xiphias (contournement)"),b("bulg","ennemi","infanterie","Armée de Samuel")],phases:[{titre:"Le défilé barré",description:"Samuel barre le défilé de Kleidion d'une palissade que les assauts frontaux de Basile II ne parviennent pas à forcer.",positions:{bas:m(24,30,0),xiph:m(14,44,0),bulg:m(58,30,180)}},{titre:"Le sentier de Xiphias",description:"Nicéphore Xiphias contourne le massif du Belasitsa par un sentier de montagne et débouche sur les arrières bulgares.",positions:{xiph:m(60,10,90)}},{titre:"Pris entre deux feux",description:"Attaquée de front et à revers, l'armée bulgare s'effondre ; des milliers d'hommes sont capturés. La tradition de l'aveuglement des prisonniers, rapportée bien plus tard, est probablement amplifiée — la Bulgarie, elle, tombera en 1018.",positions:{xiph:m(66,24,135),bas:m(44,30,0),bulg:U(60,34,90)}}]},"levounion-1091":{terrain:[{type:"riviere",points:"10,58 20,44 24,28 20,10",label:"Maritsa"},{type:"colline",x:64,y:10,rx:16,ry:5,label:"mont Lébounion"},{type:"camp",x:66,y:32,label:"camp petchénègue (familles)"}],units:[b("byz","byz","infanterie","Alexis Ier"),b("koum","allie","cavalerie","Coumans alliés"),b("pech","ennemi","infanterie","Petchénègues")],phases:[{titre:"L'alliance de la dernière chance",description:"Pris en tenaille entre les Petchénègues en Thrace et la flotte turque de Tzachas, Alexis conclut in extremis une alliance avec 40 000 Coumans — d'anciens ennemis des Petchénègues.",positions:{byz:m(34,44,0),koum:m(38,12,0),pech:m(66,30)}},{titre:"L'assaut du 29 avril",description:"À l'aube, Byzantins et Coumans attaquent ensemble le camp, où l'ensemble du peuple petchénègue — guerriers et familles — s'est concentré.",positions:{byz:m(52,38,20),koum:m(54,18,-20)}},{titre:"« Un peuple entier périt en un jour »",description:"La formule d'Anne Comnène est une image, mais la réalité est brutale : les Petchénègues disparaissent comme puissance. L'empire assiégé de 1091 est sauvé — le redressement comnène commence.",positions:{pech:U(70,32,90),byz:m(58,34,10),koum:m(62,22,-10)}}]},"philomelion-1116":{terrain:[{type:"label",x:50,y:6,text:"Anatolie centrale"},{type:"label",x:14,y:56,text:"← retour vers l'empire"}],units:[b("carre","byz","infanterie","Parataxis (carré creux)"),b("civ","byz","chef","Civils et bagages"),b("turc1","ennemi","cavalerie","Cavalerie seldjoukide"),b("turc2","ennemi","cavalerie","Cavalerie seldjoukide")],phases:[{titre:"Le carré en marche",description:"Alexis fait avancer son armée en parataxis : un grand carré creux abritant bagages et populations grecques évacuées, que la cavalerie turque ne peut entamer.",positions:{carre:m(44,30),civ:m(44,36),turc1:m(70,14,200),turc2:m(72,46,160)}},{titre:"Le harcèlement stérile",description:"Les attaques tournoyantes se succèdent ; des contre-charges réglées, limitées à quelques centaines de mètres, les repoussent sans jamais rompre la formation.",positions:{turc1:m(56,18,200),turc2:m(58,42,160),carre:m(40,30)}},{titre:"La paix et l'évacuation",description:"Malik Shah, impuissant, demande la paix. L'armée rentre en escortant les populations — dernière victoire, prudente et méthodique, du vieil Alexis.",positions:{turc1:U(80,12,0),turc2:U(84,48,0),carre:m(28,30),civ:m(28,36)}}]},"beroia-1122":{terrain:[{type:"camp",x:62,y:30,label:"laager (chariots)"},{type:"label",x:20,y:8,text:"Thrace du nord"}],units:[b("emp","byz","cavalerie","Jean II"),b("inf","byz","infanterie","Infanterie"),b("var","byz","infanterie","Garde varangienne"),b("pech","ennemi","cavalerie","Petchénègues")],phases:[{titre:"La forteresse de chariots",description:"La dernière grande horde petchénègue, passée au sud du Danube, se retranche derrière son laager — un cercle de chariots quasi imprenable — après l'échec des négociations.",positions:{emp:m(24,16,0),inf:m(20,34,0),var:m(12,46,0),pech:m(62,30)}},{titre:"Les assauts repoussés",description:"Cavalerie et infanterie échouent contre la muraille de chariots, sous les flèches ; l'empereur lui-même est touché à la jambe.",positions:{emp:m(44,18,-20),inf:m(42,36,20)}},{titre:"Les haches varangiennes",description:"Jean II engage sa garde : les haches danoises ouvrent le laager. Le camp est pris, les survivants enrôlés ou installés comme colons — les Petchénègues sortent de l'
